<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Protech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #ff7315;
            --dark-bg: #1a1a1a;
            --input-bg: #d9d9d9;
            --footer-bg: #403e3e;
        }
        body { background-color: var(--dark-bg); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .header-bar { background-color: var(--brand-orange); height: 80px; width: 100%; margin-top: 10px; }
        .signup-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 15px; }
        .signup-card { background-color: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .signup-card h1 { font-weight: 800; text-align: center; margin-bottom: 30px; }
        .form-label { font-weight: 500; margin-bottom: 5px; }
        .form-control { background-color: var(--input-bg); border: 2px solid transparent; border-radius: 10px; height: 45px; }
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 45px; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; color: #666; font-size: 1.1rem; line-height: 1; z-index: 10; }
        .toggle-password:hover { color: var(--brand-orange); }
        .form-control.is-invalid { border-color: #dc3545 !important; background-color: var(--input-bg); background-image: none; }
        .form-control.is-valid   { border-color: #198754 !important; background-color: var(--input-bg); background-image: none; }
        .btn-signup { background-color: var(--brand-orange); color: white; border: none; border-radius: 8px; padding: 12px; font-weight: bold; font-size: 1.2rem; width: 100%; margin-top: 10px; }
        .btn-signup:hover { background-color: #e66612; color: white; }
        .btn-signup:disabled { opacity: 0.7; cursor: not-allowed; }
        .footer-bar { background-color: var(--footer-bg); height: 120px; width: 100%; }
        .invalid-feedback, .valid-feedback { font-size: 0.8rem; }
        #strengthBar { height: 5px; border-radius: 3px; transition: width 0.3s, background-color 0.3s; width: 0%; }
        #serverMessage { display: none; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header-bar"></div>
    <div class="signup-container">
        <div class="signup-card">
            <h1>Sign Up</h1>

            <div id="serverMessage"></div>

            <form id="signupForm" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First name:</label>
                        <input type="text" class="form-control" id="firstName" name="firstName" required>
                        <div class="invalid-feedback">Required.</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last name:</label>
                        <input type="text" class="form-control" id="lastName" name="lastName" required>
                        <div class="invalid-feedback">Required.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email:</label>
                    <input type="text" class="form-control" id="email" name="email" required autocomplete="email">
                    <div class="invalid-feedback" id="emailError">Please enter a valid email.</div>
                </div>

                <div class="mb-1">
                    <label class="form-label">Password:</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" name="password" minlength="6" required>
                        <button type="button" class="toggle-password" data-target="password" aria-label="Show password">👁️</button>
                    </div>
                    <div class="invalid-feedback" id="passwordError">Must be at least 6 characters.</div>
                </div>

                <div class="mb-3 mt-1">
                    <div style="background:#e0e0e0;border-radius:3px;height:5px;">
                        <div id="strengthBar"></div>
                    </div>
                    <small id="strengthLabel" class="text-muted"></small>
                </div>

                <div class="mb-4">
                    <label class="form-label">Re-enter Password:</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Show confirm password">👁️</button>
                    </div>
                    <div class="invalid-feedback" id="confirmError">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn btn-signup" id="submitBtn">Sign Up</button>
            </form>
        </div>
    </div>
    <div class="footer-bar"></div>

    <script>
    (() => {
        'use strict';

        const form          = document.getElementById('signupForm');
        const emailInput    = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput  = document.getElementById('confirmPassword');
        const strengthBar   = document.getElementById('strengthBar');
        const strengthLabel = document.getElementById('strengthLabel');
        const submitBtn     = document.getElementById('submitBtn');
        const serverMsg     = document.getElementById('serverMessage');

        function setValid(input)   { input.classList.remove('is-invalid'); input.classList.add('is-valid'); }
        function setInvalid(input) { input.classList.remove('is-valid'); input.classList.add('is-invalid'); }
        function clearState(input) { input.classList.remove('is-valid', 'is-invalid'); }

        function showServerMessage(text, type) {
            serverMsg.textContent          = text;
            serverMsg.style.display        = 'block';
            serverMsg.style.background     = type === 'success' ? '#d1fae5' : '#fee2e2';
            serverMsg.style.color          = type === 'success' ? '#065f46' : '#991b1b';
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(value.trim());
        }

        emailInput.addEventListener('input', () => {
            const val = emailInput.value.trim();
            if (!val) { clearState(emailInput); return; }
            if (isValidEmail(val)) {
                setValid(emailInput);
            } else {
                setInvalid(emailInput);
                const emailError = document.getElementById('emailError');
                if (!val.includes('@'))                    emailError.textContent = "Missing '@' — e.g. name@example.com";
                else if (!val.split('@')[1]?.includes('.')) emailError.textContent = "Missing domain dot — e.g. name@example.com";
                else                                       emailError.textContent = "Please enter a valid email.";
            }
        });

        function getStrength(pw) {
            let s = 0;
            if (pw.length >= 6)          s++;
            if (pw.length >= 10)         s++;
            if (/[A-Z]/.test(pw))        s++;
            if (/[0-9]/.test(pw))        s++;
            if (/[^A-Za-z0-9]/.test(pw)) s++;
            return s;
        }

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            if (!val) { clearState(passwordInput); strengthBar.style.width = '0%'; strengthLabel.textContent = ''; return; }
            val.length < 6 ? setInvalid(passwordInput) : setValid(passwordInput);

            const levels = [
                { label: '',            color: 'transparent', pct: '0%'   },
                { label: 'Weak',        color: '#dc3545',     pct: '20%'  },
                { label: 'Weak',        color: '#dc3545',     pct: '40%'  },
                { label: 'Fair',        color: '#ffc107',     pct: '60%'  },
                { label: 'Strong',      color: '#198754',     pct: '80%'  },
                { label: 'Very Strong', color: '#0d6efd',     pct: '100%' },
            ];
            const lvl = levels[getStrength(val)];
            strengthBar.style.width           = lvl.pct;
            strengthBar.style.backgroundColor = lvl.color;
            strengthLabel.textContent         = lvl.label;

            if (confirmInput.value) validateConfirm();
        });

        function validateConfirm() {
            const val = confirmInput.value;
            if (!val) { clearState(confirmInput); return; }
            val === passwordInput.value ? setValid(confirmInput) : setInvalid(confirmInput);
        }
        confirmInput.addEventListener('input', validateConfirm);

        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.getAttribute('data-target'));
                const hide  = input.type === 'password';
                input.type      = hide ? 'text' : 'password';
                btn.textContent = hide ? '🙈' : '👁️';
            });
        });

        form.addEventListener('submit', async event => {
            event.preventDefault();
            serverMsg.style.display = 'none';
            let valid = true;

            const firstName = document.getElementById('firstName');
            const lastName  = document.getElementById('lastName');

            if (!firstName.value.trim()) { setInvalid(firstName); valid = false; } else setValid(firstName);
            if (!lastName.value.trim())  { setInvalid(lastName);  valid = false; } else setValid(lastName);
            if (!isValidEmail(emailInput.value)) { setInvalid(emailInput); valid = false; } else setValid(emailInput);
            if (passwordInput.value.length < 6)  { setInvalid(passwordInput); valid = false; } else setValid(passwordInput);
            if (confirmInput.value !== passwordInput.value || !confirmInput.value) { setInvalid(confirmInput); valid = false; } else setValid(confirmInput);

            if (!valid) return;

            submitBtn.disabled    = true;
            submitBtn.textContent = 'Sending…';

            try {
                const formData = new FormData(form);
                const res      = await fetch('signup.php', { method: 'POST', body: formData });
                const data     = await res.json();

                if (data.success) {
                    showServerMessage('✅ ' + data.message, 'success');
                    form.reset();
                    form.querySelectorAll('.form-control').forEach(clearState);
                    strengthBar.style.width   = '0%';
                    strengthLabel.textContent = '';
                } else {
                    const msg = data.errors ? data.errors.join(' ') : data.message;
                    showServerMessage('❌ ' + msg, 'error');
                }
            } catch (err) {
                showServerMessage('❌ Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Sign Up';
            }
        });

    })();
    </script>
</body>
</html>
